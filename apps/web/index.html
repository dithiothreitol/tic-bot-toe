<!doctype html>
<html lang="pl" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta name="color-scheme" content="dark" />
    <meta name="theme-color" content="#05070c" />

    <!-- Icons + PWA (generated: scripts/gen/icons.ts, see docs/ASSETS-PLAN.md) -->
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.webmanifest" />

    <!--
      Polish defaults. In production the SERVER owns this block: it rewrites
      `lang`, title, description, canonical, hreflang, OG/Twitter and JSON-LD for
      the language of the path (`/en/...` → English) — see apps/server/src/og/meta.ts.
      What stays here is what `vite dev` and a bare `vite preview` fall back to.
    -->
    <title>tic-bot-toe — LLM Game Arena</title>
    <meta
      name="description"
      content="Arena, w której modele językowe i ludzie grają w kółko i krzyżyk oraz statki. Telemetria ruchów, rankingi Elo, Precyzja, wykresy i powtórki — zobacz, czym różnią się modele bez czytania benchmarków."
    />
    <meta name="robots" content="index, follow, max-image-preview:large" />
    <meta name="author" content="tic-bot-toe" />
    <link rel="canonical" href="%VITE_SITE_URL%/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="tic-bot-toe — LLM Game Arena" />
    <meta property="og:locale" content="pl_PL" />
    <meta property="og:title" content="tic-bot-toe — LLM Game Arena" />
    <meta
      property="og:description"
      content="Modele językowe i ludzie grają w kółko i krzyżyk oraz statki. Telemetria, rankingi Elo, Precyzja, wykresy i powtórki."
    />
    <meta property="og:url" content="%VITE_SITE_URL%/" />
    <meta property="og:image" content="%VITE_SITE_URL%/og.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="tic-bot-toe — LLM Game Arena" />
    <meta
      name="twitter:description"
      content="Modele językowe i ludzie grają w kółko i krzyżyk oraz statki. Telemetria, rankingi Elo, Precyzja, wykresy i powtórki."
    />
    <meta name="twitter:image" content="%VITE_SITE_URL%/og.png" />

    <!-- Structured data (agent-friendly) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "tic-bot-toe — LLM Game Arena",
        "applicationCategory": "GameApplication",
        "operatingSystem": "Web",
        "inLanguage": "pl",
        "description": "Arena, w której modele językowe i ludzie grają w kółko i krzyżyk oraz statki. Telemetria ruchów, rankingi Elo, Precyzja, wykresy i powtórki.",
        "isAccessibleForFree": true,
        "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" }
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

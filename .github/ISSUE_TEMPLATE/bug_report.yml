name: 🐛 Bug report
description: Report something that isn't working as expected
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug! Please search existing issues first.
        For **security vulnerabilities**, do not open an issue — see [SECURITY.md](../../SECURITY.md).
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug, and what you expected instead.
      placeholder: When I do X, Y happens instead of Z.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Frontend (apps/web)
        - Backend (apps/server)
        - Game logic (packages/game-core)
        - Provider (OpenRouter / WebLLM / Ollama)
        - Deploy / Docker
        - Other / not sure
    validations:
      required: true
  - type: input
    id: model
    attributes:
      label: Model / provider (if relevant)
      placeholder: e.g. openai/gpt-4o-mini via OpenRouter, or WebLLM Llama-3
  - type: textarea
    id: env
    attributes:
      label: Environment
      placeholder: |
        - OS:
        - Browser:
        - Node / pnpm version (if running locally):
  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots
      render: shell
